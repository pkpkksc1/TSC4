<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSC 글 뷰어</title>
<style>
  body{margin:0;background:#fff;color:#000;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;}
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px; border-bottom:2px solid #000; gap:10px; flex-wrap:wrap;
  }
  .brand{border:2px solid #000; padding:8px 14px; font-weight:900; min-width:80px; text-align:center;}
  .btns{display:flex; gap:10px;}
  button{
    border:2px solid #000; background:#fff; color:#000;
    padding:10px 18px; font-weight:900; cursor:pointer;
  }
  .wrap{max-width:980px;margin:0 auto;padding:18px;}
  .status{font-weight:900; font-size:14px; margin:10px 0 14px; text-align:right;}
  .box{
    border:2px solid #000;
    min-height:60vh;
    padding:18px;
    white-space:pre-wrap;   /* 줄바꿈 유지 */
    line-height:1.6;
    font-size:18px;
  }
  @media (max-width:600px){
    .box{font-size:16px; min-height:65vh;}
    button{padding:10px 14px;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">TSC</div>
    <div class="btns">
      <button id="prev">이전</button>
      <button id="next">다음</button>
    </div>
  </div>

  <div class="wrap">
    <div class="status" id="status">불러오는 중...</div>
    <div class="box" id="content">data.txt 불러오는 중...</div>
  </div>

<script>
  const FILE_URL = "data.txt";   // 같은 폴더(루트)에 data.txt 올리기
  const SEP = "\n---\n";         // 구분자 (원하면 "---"만으로도 가능)

  let pages = [];
  let idx = 0;

  function normalize(text){
    // 줄끝 정리 + 구분자 통일(--- 앞뒤 공백/줄바꿈 있어도 잘 자르게)
    return text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  }

  function splitPages(text){
    // --- 라인이 있으면 그걸 기준으로 자르기(유연하게)
    // (줄바꿈 없이 ---만 써도 동작하게)
    const raw = text.split(/\n\s*---\s*\n/g);
    return raw.map(s => s.trim()).filter(Boolean);
  }

  function render(){
    const st = document.getElementById("status");
    const box = document.getElementById("content");

    if(!pages.length){
      st.textContent = "데이터 없음 (data.txt 확인)";
      box.textContent = "data.txt에 내용을 넣고 --- 로 구분해줘!";
      return;
    }

    if(idx < 0) idx = 0;
    if(idx >= pages.length) idx = pages.length - 1;

    st.textContent = `${idx+1} / ${pages.length}`;
    box.textContent = pages[idx];
  }

  function next(){
    if(!pages.length) return;
    idx = (idx + 1) % pages.length;
    render();
  }

  function prev(){
    if(!pages.length) return;
    idx = (idx - 1 + pages.length) % pages.length;
    render();
  }

  async function init(){
    try{
      const res = await fetch(FILE_URL, { cache: "no-store" });
      if(!res.ok) throw new Error("fetch failed");
      const text = normalize(await res.text());
      pages = splitPages(text);
      idx = 0;
      render();
    }catch(e){
      document.getElementById("status").textContent = "파일 못 불러옴";
      document.getElementById("content").textContent =
        "data.txt 파일이 리포지토리 루트에 있는지, 파일명이 정확한지 확인해줘!";
    }
  }

  document.getElementById("next").addEventListener("click", next);
  document.getElementById("prev").addEventListener("click", prev);

  // PC 키보드
  window.addEventListener("keydown", (e)=>{
    if(e.key === "ArrowRight") next();
    if(e.key === "ArrowLeft") prev();
  });

  init();
</script>
</body>
</html>
